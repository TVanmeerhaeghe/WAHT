name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set repository name to lowercase
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Build & Push backend
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          push: true
          tags: ghcr.io/${{ env.REPO }}/backend:latest,ghcr.io/${{ env.REPO }}/backend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          push: true
          tags: ghcr.io/${{ env.REPO }}/frontend:latest,ghcr.io/${{ env.REPO }}/frontend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push worker
        uses: docker/build-push-action@v6
        with:
          context: ./apps/worker
          push: true
          tags: ghcr.io/${{ env.REPO }}/worker:latest,ghcr.io/${{ env.REPO }}/worker:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
